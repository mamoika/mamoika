<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ruslan | Finanse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/finanse.css">
  </head>
  <body>
    <!-- Ekran logowania (Supabase Auth) -->
    <div id="lock-screen" class="lock-screen">
      <div class="lock-card glass">
        <div class="lock-icon">🔒</div>
        <h2>Finanse</h2>
        <p>Zaloguj się, aby zobaczyć swoje zadłużenia</p>
        <form id="lock-form">
          <input type="email" id="login-email" placeholder="E-mail" autocomplete="username" required />
          <input type="password" id="login-password" placeholder="Hasło" autocomplete="current-password" required />
          <button type="submit" class="btn btn-primary" id="login-btn">Zaloguj</button>
        </form>
        <p id="lock-error" class="lock-error"></p>
      </div>
    </div>

    <!-- Główna treść (ukryta przed zalogowaniem) -->
    <div id="app" class="app-hidden">
      <nav class="top-nav glass">
        <div class="nav-content">
          <a href="/" class="nav-logo">Ruslan</a>
          <div class="nav-links">
            <a href="/">← Portfolio</a>
            <a href="#" id="logout-btn">Wyloguj</a>
          </div>
        </div>
      </nav>

      <main class="finanse-main">
        <!-- Podsumowanie -->
        <section class="summary-section">
          <div class="summary-header">
            <h1>Moje Finanse</h1>
            <p class="summary-subtitle">Śledzenie zadłużeń, rat i stałych opłat</p>
          </div>
          <div class="summary-cards">
            <div class="summary-card glass">
              <span class="summary-label">Łączne zadłużenie</span>
              <span class="summary-value" id="total-debt">— zł</span>
            </div>
            <div class="summary-card glass">
              <span class="summary-label">Miesięczne obciążenie</span>
              <span class="summary-value" id="total-monthly">— zł</span>
            </div>
            <div class="summary-card glass">
              <span class="summary-label">Stałe opłaty / mies.</span>
              <span class="summary-value" id="total-subs">— zł</span>
            </div>
          </div>
        </section>

        <!-- Lista zadłużeń -->
        <section class="debts-section">
          <div class="section-top">
            <h2>Moje pozycje</h2>
            <button class="btn btn-primary" id="open-modal-btn">+ Dodaj</button>
          </div>

          <!-- Filtry -->
          <div class="filter-tabs">
            <button class="filter-tab active" data-type="all">Wszystkie</button>
            <button class="filter-tab" data-type="kredyt">Kredyty</button>
            <button class="filter-tab" data-type="paypo">PayPo / BNPL</button>
            <button class="filter-tab" data-type="studia">Studia</button>
            <button class="filter-tab" data-type="inne">Inne</button>
            <button class="filter-tab" data-type="subscription">Stałe opłaty</button>
          </div>

          <div id="debts-list" class="debts-list">
            <!-- Wypełniany przez JS -->
          </div>
        </section>
      </main>
    </div>

    <!-- Modal dodawania/edycji -->
    <div id="debt-modal" class="modal-overlay hidden">
      <div class="modal-card glass">
        <div class="modal-header">
          <h3 id="modal-title">Dodaj zadłużenie</h3>
          <button class="modal-close" id="close-modal-btn">✕</button>
        </div>
        <form id="debt-form" class="debt-form">
          <input type="hidden" id="debt-id" />

          <!-- Przełącznik rodzaju pozycji -->
          <div class="kind-toggle">
            <button type="button" class="kind-btn active" data-kind="debt">Zadłużenie</button>
            <button type="button" class="kind-btn" data-kind="subscription">Stała opłata</button>
          </div>

          <label>Nazwa</label>
          <input type="text" id="debt-name" placeholder="np. Kredyt gotówkowy PKO" required />

          <!-- Pola dla ZADŁUŻENIA -->
          <div id="debt-fields">
            <label>Typ</label>
            <select id="debt-type">
              <option value="kredyt">Kredyt bankowy</option>
              <option value="paypo">PayPo / BNPL</option>
              <option value="studia">Opłaty za studia</option>
              <option value="inne">Inne</option>
            </select>

            <label>Status</label>
            <select id="debt-status">
              <option value="do_zaplaty">Do zapłaty</option>
              <option value="oplacone">Opłacone</option>
            </select>

            <!-- Pojedyncza kwota (gdy bez rozbicia na raty) -->
            <div id="single-amount-fields">
              <label>Pozostała kwota (zł)</label>
              <input type="number" id="debt-remaining" placeholder="np. 5000" min="0" step="0.01" />

              <label>Całkowita kwota (zł) <span class="optional">opcjonalnie</span></label>
              <input type="number" id="debt-total" placeholder="np. 10000" min="0" step="0.01" />

              <label>Rata miesięczna (zł) <span class="optional">opcjonalnie</span></label>
              <input type="number" id="debt-monthly" placeholder="np. 350" min="0" step="0.01" />

              <label>Termin / data spłaty <span class="optional">opcjonalnie</span></label>
              <input type="date" id="debt-due" />
            </div>

            <!-- Rozbicie na raty -->
            <div class="installments-block">
              <label>Raty <span class="optional">opcjonalnie — rozbij na poszczególne płatności</span></label>
              <div id="installments-list"></div>
              <button type="button" class="btn-add-rata" id="add-installment-btn">+ Dodaj ratę</button>
              <p class="installments-hint" id="installments-hint"></p>
            </div>
          </div>

          <!-- Pola dla STAŁEJ OPŁATY / SUBSKRYPCJI -->
          <div id="subscription-fields" style="display:none">
            <label>Kategoria</label>
            <select id="sub-category">
              <option value="komorka">Sieć komórkowa</option>
              <option value="internet">Internet</option>
              <option value="streaming">Streaming / media</option>
              <option value="sub_inne">Inne</option>
            </select>

            <label>Kwota (zł)</label>
            <input type="number" id="sub-amount" placeholder="np. 49" min="0" step="0.01" />

            <label>Cykl płatności</label>
            <select id="sub-cycle">
              <option value="monthly">Miesięcznie</option>
              <option value="yearly">Rocznie</option>
            </select>

            <label>Dzień płatności w miesiącu <span class="optional">opcjonalnie</span></label>
            <input type="number" id="sub-day" placeholder="np. 10" min="1" max="31" />

            <label class="checkbox-label"><input type="checkbox" id="sub-active" checked /> Aktywna (wliczana do obciążenia)</label>
          </div>

          <label>Notatki <span class="optional">opcjonalnie</span></label>
          <textarea id="debt-notes" placeholder="Dodatkowe informacje..." rows="3"></textarea>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="cancel-modal-btn">Anuluj</button>
            <button type="submit" class="btn btn-primary" id="debt-submit-btn">Zapisz</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/src/finanse.js"></script>
  </body>
</html>
